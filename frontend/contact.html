<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact — zazenware</title>
  <meta name="description" content="Get in touch with zazenware about custom work, collaborations, or questions." />

  <script src="/scripts/theme-init.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Special+Elite&family=UnifrakturMaguntia&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="/styles/main.css" />

  <script type="module" src="/scripts/partials.js"></script>
  <script type="module" src="/scripts/theme.js"></script>
  <script type="module" src="/scripts/nav.js"></script>
  <script type="module" src="/scripts/cart-badge.js"></script>

  <!-- Contact page script -->
  <script type="module" src="/scripts/contact.js"></script>
</head>
<body>

  <div id="site-header"></div>

  <main id="main-content" class="zw-container zw-stack-xl" style="padding-block: 2rem;">

    <!-- HERO -->
    <section class="zw-hero">
      <div class="zw-hero__eyebrow">Get in touch</div>
      <h1 class="zw-hero__title zw-display">contact</h1>
      <p class="zw-hero__sub">
        Questions, custom work requests, or just want to say hello? Send a message and I'll get back to you soon.
      </p>
    </section>

    <!-- INTRO TEXT — wrapped in panel -->
    <article class="zw-panel zw-prose">
      <p>
        I respond to all messages, usually within a day or two. For custom work (band merch, event designs, etc.), let me know what you have in mind and we can talk details.
      </p>
    </article>

    <!-- CONTACT FORM — wrapped in panel -->
    <article class="zw-panel">
      <form id="contact-form" class="zw-form">

        <!-- Name field -->
        <div class="zw-form-group">
          <label for="contact-name" class="zw-label zw-label--required">Name</label>
          <input
            id="contact-name"
            type="text"
            name="name"
            class="zw-input"
            required
            aria-required="true"
          />
        </div>

        <!-- Email field -->
        <div class="zw-form-group">
          <label for="contact-email" class="zw-label zw-label--required">Email</label>
          <input
            id="contact-email"
            type="email"
            name="email"
            class="zw-input"
            required
            aria-required="true"
          />
        </div>

        <!-- Subject field -->
        <div class="zw-form-group">
          <label for="contact-subject" class="zw-label zw-label--required">Subject</label>
          <input
            id="contact-subject"
            type="text"
            name="subject"
            class="zw-input"
            required
            aria-required="true"
          />
        </div>

        <!-- Message field -->
        <div class="zw-form-group">
          <label for="contact-message" class="zw-label zw-label--required">Message</label>
          <textarea
            id="contact-message"
            name="message"
            class="zw-textarea"
            required
            aria-required="true"
          ></textarea>
        </div>

        <!-- Honeypot (spam protection) -->
        <div class="zw-honeypot">
          <input type="text" name="zw_hp" tabindex="-1" />
          <input type="hidden" name="zw_t" />
        </div>

        <!-- Status message -->
        <div id="contact-status" class="zw-form-group"></div>

        <!-- Submit button -->
        <div class="zw-form-group">
          <button
            type="submit"
            id="contact-submit"
            class="zw-btn zw-btn--primary zw-btn--large"
          >
            Send Message
          </button>
        </div>

      </form>
    </article>

  </main>

  <div id="site-footer"></div>

</body>
</html>
